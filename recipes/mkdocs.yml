site_name: Receitas
site_description: Receitas italianas e brasileiras.
site_author: Djonathan Luiz de Oliveira Quadras

# Configuração do Tema
theme:
  name: material
  palette:
    primary: brown
    accent: deep orange

plugins:
  - search
  - tags

nav:
  - Início: index.md
  - Entradas:
      - Tortinhas de Frango: Entradas/tortinha_frango.md
      - Tramezzino vegan: Entradas/tramezzino_vegan.md
      - Cocottine di polenta con spinaci, salsiccia e provola: Entradas/cocottine_polenta_spinaci.md
  - Primi:
      - Cannelloni al ragù di lenticchie: Primi/canelloni_lenticchie.md
      - Carbonara di Zucchine: Primi/carbonara_zucchine.md
      - Pasta al copollotto e limone: Primi/pasta_cipollotto.md
      - Zuppa di piselli con i quadrucci: Primi/zuppa_piselli.md
  - Secondi:
      - Calamari Ripieni di Riso: Secondi/calamari_riso.md
      - Lampredotto ai carciofi: Secondi/lampredotto_carciofi.md
      - Pollo al miele e limone: Secondi/pollo_miele.md
      - Polpettone al vino con patate: Secondi/polpettone_vino_patate.md
  - Contorni:
      - Cavolfiore gratinato: Contorni/cavolfiore_gratinato.md
      - Indivia brasata agli agrumi: Contorni/indivia_agrumi.md
      - Stufato di Verdure Estive: Contorni/stufato_verdure.md
  - Sobremesas:
      - Caramelle mou: Sobremesas/caramelle_mou.md
      - Tiramisù alla Birra: Sobremesas/tiramisu_birra.md
  - Bolos:
      - Bolo da Família Quadras: Bolos/bolo_quadras.md
      - Bolo de Banana: Bolos/bolo_banana.md
      - Crostata con pere e cannela: Bolos/crostata_pere.md
  - Padaria:
      - Pão de Queijo: Padaria/pao_de_queijo.md
      - Rosca Joinvillense: Padaria/rosca.md